name: oadmt_2026_demo
channels:
  - conda-forge
dependencies:
  - boto3
  - catboost
  - chemprop >= 2.1.1
  - datamol
  - h5py
  - hyperopt
  - intake
  - ipykernel
  - intake-parquet
  - joblib
  - lightgbm
  - loguru
  - matplotlib
  - mordredcommunity
  - numpy
  - pandas
  - pingouin
  - pip
  - python >= 3.12,<3.14
  - pytorch
  - pytorch-lightning
  - rdkit
  - rich
  - scikit-learn
  - scikit-posthocs
  - scipy
  - seaborn
  - splito
  - statsmodels
  - tabulate
  - uncertainty-toolbox
  - wandb
  - xgboost
  - zarr
  - pip:
    - click
    - email-validator
    - phx-class-registry
    - tabpfn-extensions
    - git+https://github.com/PriorLabs/TabPFN.git@main
    - git+https://github.com/JacksonBurns/neural-pairwise-regression.git
    - git+https://github.com/OpenADMET/molfeat.git@main
    - git+https://github.com/OpenADMET/openadmet-models.git@main
    - setuptools <82.0.0
