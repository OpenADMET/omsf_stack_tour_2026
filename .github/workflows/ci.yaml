name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run at 05:30 UTC every Monday
    - cron: '30 5 * * 1'
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}, Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Additional info about the build
        shell: bash
        run: |
          uname -a
          df -h
          ulimit -a

      - uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          environment-name: oadmt_2026_demo
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            python=${{ matrix.python-version }}
            catboost
            click
            datamol
            fsspec
            h5py
            hyperopt
            intake
            intake-parquet
            jinja2
            joblib
            lightgbm
            loguru
            matplotlib
            mordredcommunity
            numpy
            pandas
            pyarrow
            pydantic
            rdkit
            rich
            scikit-learn
            scipy
            seaborn
            splito
            statsmodels
            tabulate
            xgboost

      - name: Install openadmet and pytest-nbmake
        shell: bash -l {0}
        run: |
          python -m pip install "setuptools<82.0.0"
          python -m pip install phx-class-registry email-validator
          python -m pip install tabpfn-extensions
          python -m pip install "git+https://github.com/PriorLabs/TabPFN.git@main"
          python -m pip install "git+https://github.com/JacksonBurns/neural-pairwise-regression.git"
          python -m pip install "git+https://github.com/OpenADMET/molfeat.git@main"
          python -m pip install git+https://github.com/OpenADMET/openadmet-models.git@main
          python -m pip install nbmake pytest

      - name: Verify openadmet import chain
        shell: bash -l {0}
        run: |
          python -c "
          import traceback, sys
          for label, stmt in [
              ('molfeat.trans', 'from molfeat.trans import MoleculeTransformer'),
              ('AnvilSpecification', 'from openadmet.models.anvil.specification import AnvilSpecification'),
          ]:
              try:
                  exec(stmt)
                  print(f'OK: {label}')
              except Exception:
                  print(f'FAILED: {label}')
                  traceback.print_exc()
                  sys.exit(1)
          "

      - name: Verify openadmet CLI
        shell: bash -l {0}
        run: |
          which openadmet
          openadmet --help

      - name: Run CPU demo notebook
        shell: bash -l {0}
        run: |
          pytest --nbmake --nbmake-timeout=1200 --disable-warnings \
            01_train_and_finetune_CPU_demo/01_train_and_finetune.ipynb
