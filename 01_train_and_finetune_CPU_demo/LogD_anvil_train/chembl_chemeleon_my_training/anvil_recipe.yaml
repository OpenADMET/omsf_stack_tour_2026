data:
  anvil_dir: file:///store/projects/OpenADMET/omsf_con_2026_demo/01_train_and_finetune/LogD_anvil_train
  cat_entry: null
  dropna: false
  input_col: OPENADMET_CANONICAL_SMILES
  resource: file:///store/projects/OpenADMET/omsf_con_2026_demo/01_train_and_finetune/LogD_anvil_train/logd_data.csv
  target_cols:
  - logD
  test_resource: null
  train_resource: null
  type: intake
  val_resource: null
metadata:
  authors: Maria A. Castellanos
  biotargets:
  - LogD
  build_number: 0
  description: basic regression using a ChemProp multitask task model
  driver: pytorch
  email: maria.castellanos@omsf.io
  name: chemprop_pchembl
  tag: chemprop
  tags:
  - openadmet
  - example
  - chemprop
  version: v1
procedure:
  ensemble: null
  feat:
    params:
      batch_size: 128
      n_jobs: 4
      normalize_targets: true
    type: ChemPropFeaturizer
  model:
    freeze_weights: null
    param_path: null
    params:
      batch_norm: false
      dropout: 0.25
      ffn_hidden_dim: 512
      ffn_hidden_num_layers: 3
      ffn_lr: 1e-3
      ffn_weight_decay: 1e-4
      from_foundation: chemeleon
      mpnn_lr: 1e-4
      mpnn_weight_decay: 0
      n_tasks: 1
      reduce_lr_factor: 0.5
      reduce_lr_patience: 5
      scheduler: plateau
    serial_path: null
    type: ChemPropModel
  split:
    params:
      random_state: 42
      test_size: 0.2
      train_size: 0.7
      val_size: 0.1
    type: ShuffleSplitter
  train:
    params:
      accelerator: cpu
      early_stopping: true
      early_stopping_min_delta: 0.001
      early_stopping_mode: min
      early_stopping_patience: 20
      gradient_clip_val: 0.5
      max_epochs: 1
      monitor_metric: val_loss
      use_wandb: false
      wandb_project: chemeleon_permeability
    type: LightningTrainer
  transform: null
report:
  eval:
  - params: {}
    type: RegressionMetrics
  - params:
      axes_labels:
      - True LogD
      - Predicted LogD
      title: Multitask True vs Predicted LogPapp on test set
    type: RegressionPlots
